# REST Client Configuration
# Base URL for the TCC API (can be overridden with -Dbase.url=https://tcc.test)
# Default: https://localhost:8443 (for local testing with TLS)
# For Kubernetes Ingress: https://tcc.test
# Note: Use -Dbase.url=https://tcc.test when running with Ingress
de.tub.aot.client.api.TccApiClient/mp-rest/url=${base.url:https://localhost:8443}

# TLS Configuration (Task 4)
# Trust store configuration for verifying server certificates
# The CA certificate should be extracted and converted to PKCS12 format
# Use setup-certs-now.sh script to set up all certificates
de.tub.aot.client.api.TccApiClient/mp-rest/trustStore=classpath:certs/ca.p12
de.tub.aot.client.api.TccApiClient/mp-rest/trustStoreType=PKCS12
de.tub.aot.client.api.TccApiClient/mp-rest/trustStorePassword=changeit

# mTLS Configuration (Task 4) - Emergency Vehicle Client uses mTLS
# Client certificate and key for mutual TLS authentication
# These should be extracted from Kubernetes secret and placed in src/main/resources/certs/
# Use setup-certs-now.sh script to extract the client certificate
de.tub.aot.client.api.TccApiClient/mp-rest/keyStore=classpath:certs/client.p12
de.tub.aot.client.api.TccApiClient/mp-rest/keyStoreType=PKCS12
de.tub.aot.client.api.TccApiClient/mp-rest/keyStorePassword=changeit

# OIDC Client Configuration for Authentication
quarkus.oidc-client.auth-server-url=https://keycloak.test/keycloak/realms/group8-task5
quarkus.oidc-client.client-id=emergency-vehicle-client
quarkus.oidc-client.credentials.secret=HgieJW7qal3HUr0R7vThPMLd6CgSptJF
quarkus.oidc-client.grant.type=client

# Trust Keycloak TLS
quarkus.tls.oidc.trust-store.p12.path=certs/ca.p12
quarkus.tls.oidc.trust-store.p12.password=changeit
quarkus.oidc-client.tls.tls-configuration-name=oidc
