# REST Client Configuration
# Base URL for the TCC API (can be overridden with -Dbase.url=https://tcc.test)
# Default: https://localhost:8443 (for local testing with TLS)
# For Kubernetes Ingress: https://tcc.test
de.tub.aot.client.api.TccApiClient/mp-rest/url=${base.url:https://localhost:8443}

# TLS Configuration (Task 4)
# Trust store configuration for verifying server certificates
# The CA certificate should be extracted and converted to PKCS12 format
# Use setup-all-client-certs.sh script in task4/scripts/ to set up all certificates
de.tub.aot.client.api.TccApiClient/mp-rest/trustStore=classpath:certs/ca.p12
de.tub.aot.client.api.TccApiClient/mp-rest/trustStoreType=PKCS12
# Password for PKCS12 truststore
de.tub.aot.client.api.TccApiClient/mp-rest/trustStorePassword=changeit

