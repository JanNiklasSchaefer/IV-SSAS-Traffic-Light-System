# Patch to add CLIENT_SECRET environment variable from Kubernetes Secret
# Apply this after deploying the service: kubectl patch deployment gruppe8-tcc-state-controller -n gruppe8-tcc --type='json' -p='[{"op": "add", "path": "/spec/template/spec/containers/0/env/-", "value": {"name": "CLIENT_SECRET", "valueFrom": {"secretKeyRef": {"name": "tcc-state-controller-secret", "key": "client-secret"}}}}]'
#
# Or use this as a strategic merge patch:
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gruppe8-tcc-state-controller
  namespace: gruppe8-tcc
spec:
  template:
    spec:
      containers:
        - name: gruppe8-tcc-state-controller
          env:
            - name: CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: tcc-state-controller-secret
                  key: client-secret
