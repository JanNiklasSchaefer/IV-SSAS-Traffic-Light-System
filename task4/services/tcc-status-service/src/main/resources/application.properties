quarkus.log.level=INFO
quarkus.jib.base-jvm-image=eclipse-temurin:21
quarkus.container-image.insecure=true
quarkus.container-image.registry=localhost:5001
quarkus.container-image.build=true
quarkus.container-image.push=
quarkus.micrometer.export.json.enabled=true
quarkus.micrometer.export.json.path=metrics/json
quarkus.micrometer.export.prometheus.path=metrics/prometheus
quarkus.smallrye-health.extensions.enabled=true
quarkus.kubernetes.namespace=gruppe8-tcc
quarkus.kubernetes.name=gruppe8-tcc-status-service
quarkus.kubernetes.replicas=1
# Ingress disabled - using shared Ingress manifest (see kubernetes/ingress.yaml)
quarkus.kubernetes.ingress.expose=false
#--------------------------------
# TLS Configuration (Task 4)
#--------------------------------
# IMPORTANT: Services should only run in Kubernetes, not locally!
# TLS configuration is automatically enabled when deployed to Kubernetes.
# For local development, use port-forwarding or Ingress to access services.
# 
# Kubernetes-only: Mount TLS secret as volume (for deployment manifests)
quarkus.kubernetes.secret-volumes."tls-secret-volume".secret-name=task4-gruppe8-tcc-status-service-tls
quarkus.kubernetes.secret-volumes."tls-secret-volume".default-mode=0400
quarkus.kubernetes.mounts."tls-secret-volume".path=/etc/certs
quarkus.kubernetes.mounts."tls-secret-volume".read-only=true

# TLS configuration for Kubernetes deployment
# These properties are only effective when the certificates are mounted in Kubernetes
# For local development, services should not run locally
quarkus.kubernetes-config.secrets.enabled=true
quarkus.kubernetes-config.secrets=task4-gruppe8-tcc-status-service-tls
quarkus.http.insecure-requests=disabled
quarkus.http.ssl.certificate.files=/etc/certs/tls.crt
quarkus.http.ssl.certificate.key-files=/etc/certs/tls.key
quarkus.http.ssl-port=8443
# Configure Kubernetes service to use SSL port
quarkus.kubernetes.ports.http.container-port=8443
quarkus.kubernetes.ports.http.protocol=TCP

